<!DOCTYPE html>
<html>
<head>
<title>Factory Attendance</title>
</head>

<body>

<h2>Worker Check-In</h2>

<p id="factory"></p>

<label>Employee ID</label>
<input type="text" id="empid">

<br><br>

<button onclick="checkin()">Check In</button>

<p id="msg"></p>

<script>

function getSite(){

var url = new URL(window.location.href);
return url.searchParams.get("site");

}

document.getElementById("factory").innerHTML =
"Factory: " + getSite();


function checkin(){

var empid = document.getElementById("empid").value;
var site = getSite();

if(empid==""){
alert("Please enter Employee ID");
return;
}

navigator.geolocation.getCurrentPosition(function(position){

var lat = position.coords.latitude;
var lon = position.coords.longitude;

document.getElementById("msg").innerHTML =
"Checking in...";

fetch("https://script.google.com/macros/s/AKfycbxrS_rxaFC9n3rxL7AoQRqlKcU2_MqGMZfWD-x5gwNNx4oS6yyydR-StJUB_eCWtpnVzA/exec",{

method:"POST",

body: JSON.stringify({

empid:empid,
site:site,
lat:lat,
lon:lon

})

})
.then(res=>res.text())
.then(data=>{

document.getElementById("msg").innerHTML =
"Attendance recorded successfully";

});

});

}

</script>

</body>
</html>
