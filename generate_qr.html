<!DOCTYPE html>
<html>
<head>
<title>Factory QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

</head>

<body>

<h2>Factory QR Code Generator</h2>

<label>Factory Site ID</label>
<input type="text" id="site" placeholder="Example: PENANG">

<br><br>

<button onclick="generateQR()">Generate QR</button>

<br><br>

<canvas id="qr"></canvas>

<p id="link"></p>

<script>

function generateQR(){

var site = document.getElementById("site").value;

if(site==""){
alert("Please enter Factory Site ID");
return;
}

var checkinUrl = "https://khoonpin-debug.github.io/Attendance-Test/checkin.html";

var qrUrl = checkinUrl + "?site=" + site;

new QRious({
element: document.getElementById("qr"),
value: qrUrl,
size: 250
});

document.getElementById("link").innerHTML =
"Factory QR Link:<br><a href='"+qrUrl+"' target='_blank'>"+qrUrl+"</a>";

}

</script>

</body>
</html>
