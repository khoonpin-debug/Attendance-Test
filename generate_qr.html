<!DOCTYPE html>
<html>
<head>
  <title>Generate Your Attendance QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <style>
    #qr {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h2>Generate Your Daily Attendance QR</h2>

<label>Employee ID:</label>
<input type="text" id="empid" placeholder="Enter your Employee ID"><br><br>

<label>Factory Site ID:</label>
<input type="text" id="siteid" placeholder="Enter Site ID"><br><br>

<button onclick="generateQR()">Generate QR</button>

<p id="msg"></p>
<canvas id="qr"></canvas>

<script>
function generateQR() {
  var empid = document.getElementById("empid").value.trim();
  var siteid = document.getElementById("siteid").value.trim();

  if(empid === "" || siteid === "") {
    document.getElementById("msg").innerText = "Please enter both Employee ID and Site ID";
    return;
  }

  // Timestamp to make each QR unique
  var timestamp = new Date().getTime();

  // Replace this with your GitHub Pages checkin.html URL
  var checkinUrl = "https://khoonpin-debug.github.io/Attendance-Test/checkin.html";
  var qrUrl = checkinUrl + "?id=" + encodeURIComponent(empid) + "&site=" + encodeURIComponent(siteid) + "&ts=" + timestamp;

  // Generate the QR code
  var qr = new QRious({
    element: document.getElementById('qr'),
    value: qrUrl,
    size: 250
  });

  document.getElementById("msg").innerHTML = "Scan this QR code at the site to check in";
}
</script>

</body>
</html>
